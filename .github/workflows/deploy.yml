name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug File Structure
        run: |
          echo "=== ROOT DIRECTORY BEFORE AUTO-FIX ==="
          ls -la
          
          # Auto-fix folder casing for Linux compatibility (case-insensitive to case-sensitive fallback)
          if [ -d "Src" ]; then
            echo "Detected capital 'Src' directory. Renaming to 'src'..."
            mv Src src
          elif [ -d "SRC" ]; then
            echo "Detected capital 'SRC' directory. Renaming to 'src'..."
            mv SRC src
          fi
          
          if [ -f "src/Main.tsx" ]; then
            echo "Detected capital 'Main.tsx' file. Renaming to 'main.tsx'..."
            mv src/Main.tsx src/main.tsx
          fi

          echo "=== ROOT DIRECTORY AFTER AUTO-FIX ==="
          ls -la
          echo "=== SRC DIRECTORY ==="
          ls -la src || echo "src directory is missing!"
          echo "=== SRC/COMPONENTS DIRECTORY ==="
          ls -la src/components || echo "src/components directory is missing!"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Compile and Build App
        run: npm run build

      - name: Deploy built static files to GitHub Pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
